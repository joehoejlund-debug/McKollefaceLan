<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>McKollefaceLan - Global Chat</title>
  <link rel="stylesheet" href="/style.css">
  <style>
    .gchat-container {
      max-width: 700px;
      margin: 0 auto;
      height: calc(100vh - 60px);
      display: flex;
      flex-direction: column;
    }

    .gchat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 1rem 2rem;
      background: var(--bg-secondary);
      border-bottom: 1px solid var(--border);
    }

    .gchat-header .logo {
      font-size: 1.3rem;
    }

    .gchat-nav {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .gchat-back {
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: none;
      transition: all 0.2s;
    }

    .gchat-back:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .gchat-label {
      font-size: 1rem;
      color: var(--text-secondary);
      font-weight: 600;
    }

    .gchat-user-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .gchat-user-name {
      color: var(--text-secondary);
      font-size: 0.9rem;
    }

    .gchat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .gchat-msg {
      max-width: 75%;
      padding: 0.6rem 0.9rem;
      border-radius: 10px;
      font-size: 0.9rem;
      line-height: 1.4;
      word-wrap: break-word;
    }

    .gchat-msg.sent {
      align-self: flex-end;
      background: var(--accent);
      color: white;
      border-bottom-right-radius: 4px;
    }

    .gchat-msg.received {
      align-self: flex-start;
      background: var(--bg-card);
      color: var(--text-primary);
      border-bottom-left-radius: 4px;
    }

    .gchat-msg-author {
      font-size: 0.72rem;
      font-weight: 700;
      margin-bottom: 0.15rem;
      color: var(--accent);
    }

    .gchat-msg.sent .gchat-msg-author {
      color: rgba(255,255,255,0.7);
    }

    .gchat-msg-meta {
      font-size: 0.7rem;
      color: rgba(255,255,255,0.5);
      margin-top: 0.2rem;
    }

    .gchat-msg.received .gchat-msg-meta {
      color: var(--text-secondary);
    }

    .gchat-input-bar {
      display: flex;
      padding: 0.8rem 1rem;
      gap: 0.5rem;
      border-top: 1px solid var(--border);
      background: var(--bg-secondary);
    }

    .gchat-input-bar input {
      flex: 1;
      padding: 0.6rem 1rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 0.9rem;
      outline: none;
    }

    .gchat-input-bar input:focus {
      border-color: var(--accent);
    }

    .gchat-send-btn {
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: white;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
    }

    .gchat-send-btn:hover {
      background: var(--accent-hover);
    }

    /* Login prompt */
    .gchat-login {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .gchat-login-box {
      text-align: center;
      padding: 3rem;
      background: var(--bg-secondary);
      border-radius: 16px;
      border: 1px solid var(--border);
      max-width: 400px;
      width: 90%;
    }

    .gchat-login-box .logo {
      font-size: 2rem;
      margin-bottom: 0.5rem;
    }

    .gchat-login-box .subtitle {
      margin-bottom: 1.5rem;
    }

    .gchat-login-box form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .gchat-login-box input {
      padding: 0.85rem 1.2rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      font-size: 1rem;
      outline: none;
    }

    .gchat-login-box input:focus {
      border-color: var(--accent);
    }

    @media (max-width: 700px) {
      .gchat-header {
        flex-direction: column;
        gap: 0.5rem;
        padding: 0.8rem 1rem;
      }
      .gchat-messages {
        padding: 0.8rem;
      }
    }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="gchat-login" class="gchat-login" hidden>
    <div class="gchat-login-box">
      <h1 class="logo">McKollefaceLan</h1>
      <p class="subtitle">Global Chat</p>
      <form id="gchat-login-form">
        <input type="text" id="gchat-name-input" placeholder="Enter your name" required autocomplete="off" maxlength="30">
        <button type="submit" class="primary-btn">Join Chat</button>
      </form>
    </div>
  </div>

  <!-- Chat -->
  <div id="gchat-app" hidden>
    <div class="gchat-header">
      <h1 class="logo">McKollefaceLan</h1>
      <div class="gchat-nav">
        <span class="gchat-label">Global Chat</span>
      </div>
      <div class="gchat-user-info">
        <a href="/" class="gchat-back">&larr; Shop</a>
        <span id="gchat-user-name" class="gchat-user-name"></span>
      </div>
    </div>
    <div class="gchat-container">
      <div id="gchat-messages" class="gchat-messages"></div>
      <div class="gchat-input-bar">
        <input type="text" id="gchat-input" placeholder="Type a message..." autocomplete="off" maxlength="500">
        <button id="gchat-send" class="gchat-send-btn">Send</button>
      </div>
    </div>
  </div>

  <script>
  (function () {
    var currentUser = localStorage.getItem('mckollefacelan-user');
    var loginScreen = document.getElementById('gchat-login');
    var appScreen = document.getElementById('gchat-app');
    var loginForm = document.getElementById('gchat-login-form');
    var nameInput = document.getElementById('gchat-name-input');
    var userNameDisplay = document.getElementById('gchat-user-name');
    var messagesEl = document.getElementById('gchat-messages');
    var inputEl = document.getElementById('gchat-input');
    var sendBtn = document.getElementById('gchat-send');

    function escapeHtml(str) {
      var div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }

    function init() {
      if (currentUser) {
        showChat();
      } else {
        loginScreen.hidden = false;
        appScreen.hidden = true;
      }

      loginForm.addEventListener('submit', function (e) {
        e.preventDefault();
        var name = nameInput.value.trim();
        if (name) {
          currentUser = name;
          localStorage.setItem('mckollefacelan-user', name);
          showChat();
        }
      });

      sendBtn.addEventListener('click', sendMessage);
      inputEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter') sendMessage();
      });
    }

    function showChat() {
      loginScreen.hidden = true;
      appScreen.hidden = false;
      userNameDisplay.textContent = currentUser;
      loadMessages();
      setInterval(loadMessages, 3000);
      inputEl.focus();
    }

    async function loadMessages() {
      try {
        var res = await fetch('/api/chat?type=global');
        var messages = await res.json();
        renderMessages(messages);
      } catch (err) {
        // silent
      }
    }

    function renderMessages(messages) {
      if (!messages || messages.length === 0) {
        messagesEl.innerHTML = '<p style="color:var(--text-secondary);text-align:center;padding:3rem;">No messages yet. Start the conversation!</p>';
        return;
      }

      var wasAtBottom = messagesEl.scrollTop + messagesEl.clientHeight >= messagesEl.scrollHeight - 30;

      messagesEl.innerHTML = messages.map(function (msg) {
        var isMine = msg.from === currentUser;
        var cls = isMine ? 'sent' : 'received';
        var time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        return '<div class="gchat-msg ' + cls + '">' +
          '<div class="gchat-msg-author">' + escapeHtml(msg.from) + '</div>' +
          '<div>' + escapeHtml(msg.message) + '</div>' +
          '<div class="gchat-msg-meta">' + time + '</div>' +
        '</div>';
      }).join('');

      if (wasAtBottom) {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }
    }

    async function sendMessage() {
      var text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = '';
      sendBtn.disabled = true;

      try {
        await fetch('/api/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'global',
            from: currentUser,
            message: text,
          }),
        });
        await loadMessages();
        messagesEl.scrollTop = messagesEl.scrollHeight;
      } catch (err) {
        // silent
      }

      sendBtn.disabled = false;
      inputEl.focus();
    }

    init();
  })();
  </script>
</body>
</html>
