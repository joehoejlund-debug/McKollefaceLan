<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>McKollefaceLan Shop</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <!-- Login Screen -->
  <div id="login-screen" class="screen">
    <div class="login-container">
      <h1 class="logo">McKollefaceLan</h1>
      <p class="subtitle">LAN Party Shop</p>
      <form id="login-form">
        <input type="text" id="name-input" placeholder="Enter your name" required autocomplete="off" maxlength="30">
        <button type="submit" class="primary-btn">Enter Shop</button>
      </form>
    </div>
  </div>

  <!-- App Screen -->
  <div id="app-screen" class="screen" hidden>
    <header>
      <div class="header-left">
        <h1 class="logo">McKollefaceLan</h1>
      </div>
      <nav>
        <button class="nav-btn active" data-tab="shop">Shop</button>
        <button class="nav-btn" data-tab="my-orders">My Orders</button>
        <button class="nav-btn" data-tab="all-orders">All Orders</button>
        <a href="/chat.html" class="nav-btn nav-link">Global Chat</a>
        <a href="/kitchen.html" class="nav-btn nav-link" id="kitchen-link" style="display:none;">Kitchen View</a>
      </nav>
      <div class="header-right">
        <span id="user-name"></span>
        <button id="logout-btn">Logout</button>
      </div>
    </header>

    <main>
      <!-- Shop Tab -->
      <div id="tab-shop" class="tab-content">
        <div class="menu-grid">
          <div class="menu-card" data-item="toast">
            <div class="item-emoji">&#127838;</div>
            <h3>Toast</h3>
            <div class="quantity-control">
              <button class="qty-btn" data-action="decrease">&minus;</button>
              <span class="qty-value">0</span>
              <button class="qty-btn" data-action="increase">+</button>
            </div>
            <div class="toast-toppings" hidden>
              <p class="toppings-label">Toppings:</p>
              <label class="topping-option"><input type="checkbox" value="Veggie pålæg"> Veggie pålæg</label>
              <label class="topping-option"><input type="checkbox" value="Hamburgerryg"> Hamburgerryg</label>
              <label class="topping-option"><input type="checkbox" value="Ketchup"> Ketchup</label>
              <label class="topping-option"><input type="checkbox" value="Sennep"> Sennep</label>
              <label class="topping-option"><input type="checkbox" value="Mayo"> Mayo</label>
              <label class="topping-option"><input type="checkbox" value="Remoulade"> Remoulade</label>
              <label class="topping-option"><input type="checkbox" value="Oregano"> Oregano</label>
              <label class="topping-option"><input type="checkbox" value="Ost"> Ost</label>
              <label class="topping-option"><input type="checkbox" value="Cornichonner"> Cornichonner</label>
            </div>
          </div>
          <div class="menu-card" data-item="cola">
            <div class="item-icon">
              <svg viewBox="0 0 64 64" width="64" height="64" xmlns="http://www.w3.org/2000/svg">
                <rect x="18" y="8" width="28" height="48" rx="4" fill="#d32f2f"/>
                <rect x="18" y="8" width="28" height="10" rx="4" fill="#b71c1c"/>
                <rect x="22" y="12" width="20" height="2" rx="1" fill="#ef5350"/>
                <rect x="20" y="24" width="24" height="14" rx="2" fill="#fff" opacity="0.95"/>
                <text x="32" y="34" text-anchor="middle" font-size="9" font-weight="bold" font-family="Georgia, serif" fill="#d32f2f" font-style="italic">Coca-Cola</text>
                <rect x="20" y="40" width="24" height="2" rx="1" fill="#fff" opacity="0.3"/>
              </svg>
            </div>
            <h3>Cola</h3>
            <div class="quantity-control">
              <button class="qty-btn" data-action="decrease">&minus;</button>
              <span class="qty-value">0</span>
              <button class="qty-btn" data-action="increase">+</button>
            </div>
          </div>
          <div class="menu-card" data-item="fanta">
            <div class="item-icon">
              <svg viewBox="0 0 64 64" width="64" height="64" xmlns="http://www.w3.org/2000/svg">
                <rect x="18" y="8" width="28" height="48" rx="4" fill="#f57c00"/>
                <rect x="18" y="8" width="28" height="10" rx="4" fill="#e65100"/>
                <rect x="22" y="12" width="20" height="2" rx="1" fill="#ffb74d"/>
                <rect x="20" y="24" width="24" height="14" rx="2" fill="#fff" opacity="0.95"/>
                <text x="32" y="34.5" text-anchor="middle" font-size="10" font-weight="bold" font-family="Arial, sans-serif" fill="#f57c00">Fanta</text>
                <rect x="20" y="40" width="24" height="2" rx="1" fill="#fff" opacity="0.3"/>
              </svg>
            </div>
            <h3>Fanta</h3>
            <div class="quantity-control">
              <button class="qty-btn" data-action="decrease">&minus;</button>
              <span class="qty-value">0</span>
              <button class="qty-btn" data-action="increase">+</button>
            </div>
          </div>
          <div class="menu-card" data-item="xray">
            <div class="item-icon">
              <svg viewBox="0 0 64 64" width="64" height="64" xmlns="http://www.w3.org/2000/svg">
                <rect x="18" y="8" width="28" height="48" rx="4" fill="#0288d1"/>
                <rect x="18" y="8" width="28" height="10" rx="4" fill="#01579b"/>
                <rect x="22" y="12" width="20" height="2" rx="1" fill="#4fc3f7"/>
                <rect x="20" y="24" width="24" height="14" rx="2" fill="#fff" opacity="0.95"/>
                <text x="32" y="34.5" text-anchor="middle" font-size="10" font-weight="bold" font-family="Arial, sans-serif" fill="#0288d1">X-Ray</text>
                <rect x="20" y="40" width="24" height="2" rx="1" fill="#fff" opacity="0.3"/>
              </svg>
            </div>
            <h3>X-Ray</h3>
            <div class="quantity-control">
              <button class="qty-btn" data-action="decrease">&minus;</button>
              <span class="qty-value">0</span>
              <button class="qty-btn" data-action="increase">+</button>
            </div>
          </div>
        </div>
        <button id="place-order-btn" class="primary-btn order-btn" disabled>Place Order</button>
      </div>

      <!-- My Orders Tab -->
      <div id="tab-my-orders" class="tab-content" hidden>
        <div id="my-orders-list" class="orders-list">
          <p class="empty-message">No orders yet</p>
        </div>
      </div>

      <!-- All Orders Tab -->
      <div id="tab-all-orders" class="tab-content" hidden>
        <div id="all-orders-list" class="orders-list">
          <p class="empty-message">No orders yet</p>
        </div>
      </div>
    </main>
  </div>

  <!-- Kitchen Chat Popup -->
  <div id="chat-widget" class="chat-widget" hidden>
    <button id="chat-toggle" class="chat-toggle" title="Chat with Kitchen">
      <span class="chat-toggle-icon">&#128172;</span>
      <span id="chat-unread" class="chat-unread" hidden></span>
    </button>
    <div id="chat-panel" class="chat-panel" hidden>
      <div class="chat-panel-header">
        <span>Chat with Kitchen</span>
        <button id="chat-close" class="chat-close">&times;</button>
      </div>
      <div id="chat-messages" class="chat-messages"></div>
      <div class="chat-input-bar">
        <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off" maxlength="500">
        <button id="chat-send" class="chat-send-btn">Send</button>
      </div>
    </div>
  </div>

  <!-- Notification popup -->
  <div id="notification" class="notification" hidden></div>

  <script src="/app.js"></script>
</body>
</html>
